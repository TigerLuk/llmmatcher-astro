# wrangler.toml
name = "llmmatcher"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "llmmatcher-votes"
database_id = "REPLACE_WITH_D1_ID_AFTER_CREATION"

[[kv_namespaces]]
binding = "VOTE_RATE"
id = "REPLACE_WITH_KV_ID_AFTER_CREATION"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "REPLACE_WITH_SUBSCRIBERS_KV_ID"
