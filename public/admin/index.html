<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Matcher CMS</title>
  <script>
  (function() {
    var authPopup = null;
    var originalOpen = window.open;
    var checkInterval = null;

    window.open = function(url, target, features) {
      var win = originalOpen.apply(this, arguments);
      if (typeof url === "string" && url.indexOf("api/auth") !== -1) {
        authPopup = win;
        startChecking();
      }
      return win;
    };

    if (typeof BroadcastChannel !== "undefined") {
      try {
        var bc = new BroadcastChannel("decap_cms_auth");
        bc.onmessage = function(e) {
          if (e.data && e.data.token) {
            finishAuth(e.data.token);
          }
        };
      } catch(e) {}
    }

    function startChecking() {
      if (checkInterval) clearInterval(checkInterval);
      checkInterval = setInterval(function() {
        if (authPopup && authPopup.closed) {
          clearInterval(checkInterval);
          var token = localStorage.getItem("decap_cms_github_token");
          if (token) {
            localStorage.removeItem("decap_cms_github_token");
            finishAuth(token);
          }
        }
      }, 500);
    }

    function finishAuth(token) {
      var msg = "authorization:github:success:" + JSON.stringify({ token: token });
      window.postMessage(msg, window.location.origin);
    }
  })();
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
