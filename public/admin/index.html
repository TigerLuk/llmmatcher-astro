<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Matcher CMS</title>
  <script>
  (function() {
    var originalOpen = window.open;
    window.open = function(url, target, features) {
      if (typeof url === "string" && (
        url.indexOf("/api/auth") !== -1 || 
        url.indexOf("github.com/login/oauth") !== -1
      )) {
        window.location.href = url;
        return { closed: false, close: function() {}, focus: function() {} };
      }
      return originalOpen.apply(this, arguments);
    };
  })();
  
  (function() {
    var hash = window.location.hash;
    var token = null;
    
    if (hash) {
      var match = hash.match(/[#&]token=([^&]+)/);
      if (match) token = decodeURIComponent(match[1]);
    }
    
    if (token) {
      history.replaceState(null, null, window.location.pathname + window.location.search);
      
      function sendAuth() {
        var msg = "authorization:github:success:" + JSON.stringify({token: token});
        window.postMessage(msg, window.location.origin);
      }
      
      setTimeout(sendAuth, 100);
      setTimeout(sendAuth, 500);
      setTimeout(sendAuth, 1500);
      setTimeout(sendAuth, 3000);
    }
  })();
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
