<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Matcher CMS</title>
  <style>
    /* 只放大有 Markdown 工具栏的 Body 编辑器 */
    /* 特征：包含 B(粗体) I(斜体) 等格式化按钮的工具栏 */
    .sveltia-cms-editor [data-slate-editor],
    [class*="editor"] [role="textbox"][contenteditable="true"] {
      min-height: 400px !important;
    }
    
    /* 备选：通过编辑器容器定位 */
    .svelteui-Editor-container,
    [class*="MarkdownControl"] [data-slate-editor] {
      min-height: 400px !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
