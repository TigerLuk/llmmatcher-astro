<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Matcher CMS</title>
  <script>
  (function() {
    var received = false;
    
    function login(token) {
      if (received) return;
      received = true;
      localStorage.setItem("decap_cms_auth_pending", token);
      window.location.reload();
    }
    
    if (typeof BroadcastChannel !== "undefined\") {
      try {
        var bc = new BroadcastChannel("decap_cms_auth");
        bc.onmessage = function(e) {
          if (e.data && e.data.token) login(e.data.token);
        };
      } catch(e) {}
    }
    
    window.addEventListener("storage", function(e) {
      if (e.key === "decap_cms_github_token\" && e.newValue) {
        login(e.newValue);
      }
    });
    
    setInterval(function() {
      var token = localStorage.getItem("decap_cms_github_token");
      if (token) login(token);
    }, 500);
    
    window.addEventListener("load", function() {
      var token = localStorage.getItem("decap_cms_auth_pending");
      if (token) {
        localStorage.removeItem("decap_cms_auth_pending");
        localStorage.removeItem("decap_cms_github_token");
        var msg = "authorization:github:success:" + JSON.stringify({token: token});
        setTimeout(function() {
          window.postMessage(msg, window.location.origin);
        }, 500);
      }
    });
  })();
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
